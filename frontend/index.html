<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revenue Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe8;
      --panel: #fffaf4;
      --ink: #1f2933;
      --muted: #52606d;
      --accent: #c2410c;
      --line: #e7d8c9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(194, 65, 12, 0.12), transparent 28%),
        linear-gradient(180deg, #fbf7f1 0%, var(--bg) 100%);
      color: var(--ink);
      min-height: 100vh;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3.4rem);
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      max-width: 680px;
      line-height: 1.5;
    }

    .panel {
      background: rgba(255, 250, 244, 0.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(55, 36, 18, 0.08);
    }

    canvas {
      width: 100%;
      max-height: 420px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Revenue Dashboard</h1>
    <p>Monthly completed-order revenue from the processed analytics pipeline.</p>
    <section class="panel">
      <canvas id="chart"></canvas>
    </section>
  </main>

  <script>
    fetch("http://127.0.0.1:8000/api/revenue")
      .then((res) => res.json())
      .then((data) => {
        new Chart(document.getElementById("chart"), {
          type: "line",
          data: {
            labels: data.map((d) => d.order_year_month),
            datasets: [{
              label: "Revenue",
              data: data.map((d) => d.amount),
              borderColor: "#c2410c",
              backgroundColor: "rgba(194, 65, 12, 0.14)",
              borderWidth: 3,
              fill: true,
              tension: 0.3
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: {
                display: true
              }
            }
          }
        });
      })
      .catch((error) => {
        console.error("Failed to load revenue data", error);
      });
  </script>
</body>
</html>
